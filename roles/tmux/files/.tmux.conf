# --- 1. CONFIGURAÇÃO DE PREFIXO (Ctrl+a) ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- 2. CONFIGURAÇÕES GERAIS ---
# Habilita mouse
set -g mouse on

# Começar contagem de janelas e painéis do 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Garante que o PATH do Homebrew seja visto pelo Tmux
set-environment -g PATH "/opt/homebrew/bin:/usr/local/bin:/bin:/usr/bin"

# --- 3. SPLIT INTUITIVO (| e -) ---
# Usa | para dividir verticalmente (lado a lado)
unbind %
bind | split-window -h -c "#{pane_current_path}"

# Usa - para dividir horizontalmente (cima e baixo)
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# Cores corretas (True Color)
set-option -sa terminal-overrides ",xterm*:Tc"

# Começar contagem de janelas e painéis do 1 (mais lógico no teclado)
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Garante que o PATH do Homebrew seja visto pelo Tmux (Crítico para eza/zoxide/fzf)
set-environment -g PATH "/opt/homebrew/bin:/usr/local/bin:/bin:/usr/bin"

# --- 3. LISTA DE PLUGINS (TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'omerxx/tmux-sessionx'

# --- 4. CONFIGURAÇÃO DO SESSIONX ---
# Define o atalho: Prefix (Ctrl+a) + o
set -g @sessionx-bind 'o'

# Layout e Aparência
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-preview-enabled 'true'

# Integrações
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-filter-current 'false'

# Comando de listagem (Usa caminho absoluto do Eza para evitar erros)
set -g @sessionx-ls-command '/opt/homebrew/bin/eza --tree --level=2 --color=always --group-directories-first --icons'

# --- 5. INICIALIZAÇÃO (Mantenha no final) ---
run '~/.tmux/plugins/tpm/tpm'
