---
- name: Clone Oh My Zsh
  git:
    repo: https://github.com/ohmyzsh/ohmyzsh.git
    dest: "{{ ansible_facts['user_dir'] }}/.oh-my-zsh"
    depth: 1

- name: Clone Powerlevel10k
  git:
    repo: https://github.com/romkatv/powerlevel10k.git
    dest: "{{ ansible_facts['user_dir'] }}/.oh-my-zsh/custom/themes/powerlevel10k"
    depth: 1

- name: Create .zshrc
  copy:
    src: "{{ ansible_facts['user_dir'] }}/.oh-my-zsh/templates/zshrc.zsh-template"
    dest: "{{ ansible_facts['user_dir'] }}/.zshrc"
    remote_src: yes
    force: no

- name: Config Powerlevel10k at .zshrc
  lineinfile:
    path: "{{ ansible_facts['user_dir'] }}/.zshrc"
    regexp: '^ZSH_THEME='
    line: 'ZSH_THEME="powerlevel10k/powerlevel10k"'
    state: present

- name: Enable zsh plugins(git, kubectl, terraform)
  lineinfile:
    path: "{{ ansible_facts['user_dir'] }}/.zshrc"
    regexp: '^plugins=\('
    line: 'plugins=(git kubectl terraform)'
    state: present
