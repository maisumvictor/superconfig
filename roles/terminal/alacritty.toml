[general]
# Importing Catppuccin Mocha
import = [
  "~/.config/alacritty/catppuccin/catppuccin-mocha.toml"
]

[env]
TERM = "xterm-256color"

[window]
padding = { x = 10, y = 10 } # Sintaxe corrigida para TOML moderno
decorations = "Buttonless"
opacity = 0.8
blur = true
option_as_alt = "Both"

[font]
normal = { family = "MesloLGS Nerd Font Mono", style = "Regular" }
size = 18

