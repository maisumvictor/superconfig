---
# On Workbrew-managed Macs the real `brew` wrapper lives in /opt/workbrew/bin.
# We put that directory first so Ansible uses it when present, but fall back to
# normal Homebrew locations on personal machines.
- name: Updating Homebrew
  community.general.homebrew:
    update_homebrew: yes
    path: "/opt/workbrew/bin:/opt/homebrew/bin:/usr/local/bin"

- name: Add third-party taps
  community.general.homebrew_tap:
    name: "{{ item }}"
    state: present
    path: "/opt/workbrew/bin:/opt/homebrew/bin:/usr/local/bin"
  loop:
    - warrensbox/tap
    - hashicorp/tap
    - charmbracelet/tap
    - hjr265/gittop
    - huseyinbabal/tap

- name: Essentials (CLI)
  community.general.homebrew:
    path: "/opt/workbrew/bin:/opt/homebrew/bin:/usr/local/bin"
    name:
      # shell / terminal utilities
      - bash
      - bat
      - eza
      - fzf
      - ripgrep
      - tree
      - zoxide

      # dev languages / runtimes
      - go
      - node

      # version control
      - git
      - hjr265/gittop/gittop

      # cloud CLIs
      - awscli
      - aws-vault
      - azure-cli
      - doctl
      - huseyinbabal/tap/taws

      # containers / kubernetes
      - helm
      - hey
      - k3d
      - kubectl
      - kubectx
      - linkerd
      - minikube
      - velero

      # infrastructure as code
      - hashicorp/tap/terraform
      - terraform-ls
#      - tfswitch  # Enable only if needed. Disable terraform first.

      # databases
      - postgresql@18

      # data processors
      - jq
      - yq

      # security / crypto helpers
      - openssl
      - pinentry-mac

      # productivity
      - glow
      - just
      - task
      - taskwarrior-tui
      - wtfutil
      - charmbracelet/tap/crush

      # language servers (used by Neovim)
      - gopls
    state: present
